<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Boîte principale (carton/conteneur) -->
  <rect x="40" y="50" width="176" height="156" rx="16" fill="url(#grad)" />

  <!-- Highlight de boîte 3D -->
  <rect x="40" y="50" width="176" height="30" rx="16" fill="#10b981" opacity="0.8" />

  <!-- Poignée gauche de la boîte -->
  <path d="M 70 50 Q 70 35 85 35 L 85 45 Q 85 50 80 50 Z" fill="#059669" />

  <!-- Poignée droite de la boîte -->
  <path d="M 186 50 Q 186 35 171 35 L 171 45 Q 171 50 176 50 Z" fill="#059669" />

  <!-- Icône de location (flèche de partage) -->
  <circle cx="128" cy="130" r="45" fill="white" opacity="0.95" />

  <!-- Flèche symbolisant le partage/location -->
  <g transform="translate(128, 130)">
    <!-- Flèche vers la droite et le bas -->
    <path d="M -15 -15 L 15 5 L -5 15 Z" fill="#10b981" />
    <!-- Trait de location -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#10b981" stroke-width="3" opacity="0.7" />
  </g>

  <!-- Éclat de lueur -->
  <circle cx="85" cy="85" r="8" fill="white" opacity="0.6" />
</svg>